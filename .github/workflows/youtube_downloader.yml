name: دانلودر یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video/playlist URL'
        required: true
        type: string
      output_format:
        description: 'Output type'
        required: true
        type: choice
        options:
          - mp4 (video)
          - mp3 (audio only)
        default: 'mp4 (video)'
      desired_quality:
        description: 'Quality (video: 144p|360p|480p|720p|1080p  |  audio: 64kbps|128kbps|192kbps|320kbps)'
        required: false
        type: string
        default: '720p'
      max_part_mb:
        description: 'Max split size in MB (0 or blank = auto 95MB)'
        required: false
        type: string
        default: '95'
      output_folder:
        description: 'Destination folder inside the repo'
        required: false
        type: string
        default: 'downloads'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip ffmpeg
          pip3 install --quiet --upgrade yt-dlp requests

      # ─────────────────────────────────────────
      - name: Validate inputs
        id: validate
        run: |
          python3 << 'PYEOF'
          import os, sys, re

          url   = os.environ.get('INPUT_URL', '').strip()
          fmt   = os.environ.get('INPUT_FORMAT', 'mp4')
          qual  = os.environ.get('INPUT_QUALITY', '').strip()
          folder = os.environ.get('INPUT_FOLDER', 'downloads').strip()

          # ── URL check ──────────────────────────────────────
          yt_pattern = re.compile(
              r'(https?://)?(www\.)?(youtube\.com/(watch\?v=|shorts/|playlist\?list=)|youtu\.be/)[\w\-?=&%]+'
          )
          if not yt_pattern.match(url):
              print("::error::Invalid YouTube URL. Supported: watch, shorts, playlist, youtu.be")
              sys.exit(1)

          # ── Quality defaults ───────────────────────────────
          valid_video  = ('144p','360p','480p','720p','1080p','1440p','2160p')
          valid_audio  = ('64kbps','128kbps','192kbps','320kbps')

          if fmt == 'mp3':
              if qual not in valid_audio:
                  qual = '192kbps'
          else:
              if qual not in valid_video:
                  qual = '720p'

          # ── Folder safety ──────────────────────────────────
          folder = re.sub(r'[^a-zA-Z0-9_\-/]', '_', folder).strip('/')
          if not folder:
              folder = 'downloads'

          # Write outputs for next steps
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"url={url}\n")
              fh.write(f"fmt={fmt}\n")
              fh.write(f"quality={qual}\n")
              fh.write(f"folder={folder}\n")

          print(f"✅  URL     : {url}")
          print(f"✅  Format  : {fmt}")
          print(f"✅  Quality : {qual}")
          print(f"✅  Folder  : {folder}")
          PYEOF
        env:
          INPUT_URL:    ${{ github.event.inputs.video_url }}
          INPUT_FORMAT: ${{ github.event.inputs.output_format == 'mp3 (audio only)' && 'mp3' || 'mp4' }}
          INPUT_QUALITY: ${{ github.event.inputs.desired_quality }}
          INPUT_FOLDER:  ${{ github.event.inputs.output_folder }}

      # ─────────────────────────────────────────
      - name: Download with yt-dlp
        id: download
        run: |
          python3 << 'PYEOF'
          import os, sys, subprocess, json, re, shutil

          url     = "${{ steps.validate.outputs.url }}"
          fmt     = "${{ steps.validate.outputs.fmt }}"
          quality = "${{ steps.validate.outputs.quality }}"
          folder  = "${{ steps.validate.outputs.folder }}"
          tmp_dir = os.path.join(folder, ".tmp_dl")
          os.makedirs(tmp_dir, exist_ok=True)

          # ── Build yt-dlp command ───────────────────────────
          if fmt == "mp3":
              bitrate = quality.replace("kbps", "")
              cmd = [
                  "yt-dlp",
                  "--no-playlist",          # single video unless playlist URL
                  "-x",                     # extract audio
                  "--audio-format", "mp3",
                  "--audio-quality", bitrate,
                  "--embed-thumbnail",
                  "--add-metadata",
                  "--no-warnings",
                  "--restrict-filenames",
                  "-o", os.path.join(tmp_dir, "%(title).80s [%(id)s].%(ext)s"),
                  url,
              ]
          else:
              # height from e.g. "720p" → 720
              height = quality.rstrip('p')
              # Best video up to requested height + best audio, merged to mp4
              fmt_selector = (
                  f"bestvideo[height<={height}][ext=mp4]+bestaudio[ext=m4a]"
                  f"/bestvideo[height<={height}]+bestaudio"
                  f"/best[height<={height}]"
                  f"/best"
              )
              cmd = [
                  "yt-dlp",
                  "--no-playlist",
                  "-f", fmt_selector,
                  "--merge-output-format", "mp4",
                  "--embed-thumbnail",
                  "--add-metadata",
                  "--no-warnings",
                  "--restrict-filenames",
                  "-o", os.path.join(tmp_dir, "%(title).80s [%(id)s].%(ext)s"),
                  url,
              ]

          print(f"▶  Running: {' '.join(cmd)}")
          result = subprocess.run(cmd, capture_output=False, text=True)

          if result.returncode != 0:
              print("::error::yt-dlp failed. Check the URL or try a different quality.")
              sys.exit(1)

          # ── Find downloaded file ───────────────────────────
          files = [f for f in os.listdir(tmp_dir) if os.path.isfile(os.path.join(tmp_dir, f))]
          if not files:
              print("::error::No file found after download.")
              sys.exit(1)

          downloaded = files[0]
          size_mb = os.path.getsize(os.path.join(tmp_dir, downloaded)) / (1024 * 1024)
          print(f"✅  Downloaded: {downloaded}  ({size_mb:.1f} MB)")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"filename={downloaded}\n")
              fh.write(f"tmp_dir={tmp_dir}\n")
              fh.write(f"size_mb={size_mb:.1f}\n")
          PYEOF

      # ─────────────────────────────────────────
      - name: Split or move file
        run: |
          python3 << 'PYEOF'
          import os, subprocess, shutil

          folder   = "${{ steps.validate.outputs.folder }}"
          tmp_dir  = "${{ steps.download.outputs.tmp_dir }}"
          filename = "${{ steps.download.outputs.filename }}"
          size_mb  = float("${{ steps.download.outputs.size_mb }}")

          # ── Determine threshold ────────────────────────────
          raw = "${{ github.event.inputs.max_part_mb }}".strip()
          try:
              thresh = int(raw)
          except ValueError:
              thresh = 0

          # Always cap at 95 to stay under GitHub's 100 MB limit
          if thresh <= 0 or thresh > 95:
              thresh = 95

          src = os.path.join(tmp_dir, filename)

          if size_mb > thresh:
              print(f"📦  File is {size_mb:.1f} MB → splitting into {thresh} MB parts")
              zip_base = os.path.join(folder, filename + ".zip")
              subprocess.run(
                  ["zip", "-r", "-s", f"{thresh}m", zip_base, "--", src],
                  check=True,
              )

              # List created parts for the log
              parts = sorted([
                  f for f in os.listdir(folder)
                  if f.startswith(filename + ".z") or f == filename + ".zip"
              ])
              print(f"✅  Created {len(parts)} part(s): {parts}")

              # Write a README so users know how to reassemble
              readme = os.path.join(folder, f"HOW_TO_JOIN_{filename}.txt")
              with open(readme, "w") as fh:
                  fh.write(
                      f"To reassemble '{filename}' download ALL parts:\n"
                      + "\n".join(f"  {p}" for p in parts)
                      + "\n\nThen run (Linux/macOS):\n"
                      + f"  zip -FF {filename}.zip --out full.zip && unzip full.zip\n\n"
                      + "Or (Windows): use 7-Zip → open the .zip file directly.\n"
                  )
          else:
              print(f"📁  File is {size_mb:.1f} MB → moving directly (no split needed)")
              shutil.move(src, os.path.join(folder, filename))

          # Cleanup temp dir
          shutil.rmtree(tmp_dir, ignore_errors=True)
          print("✅  Done")
          PYEOF

      # ─────────────────────────────────────────
      - name: Commit and push to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FOLDER="${{ steps.validate.outputs.folder }}"
          git add "$FOLDER/"

          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            FNAME="${{ steps.download.outputs.filename }}"
            SIZE="${{ steps.download.outputs.size_mb }}"
            FMT="${{ steps.validate.outputs.fmt }}"
            QUAL="${{ steps.validate.outputs.quality }}"
            git commit -m "⬇️ YouTube ${FMT^^} – ${FNAME} (${SIZE} MB, ${QUAL}) [skip ci]"
            git push
            echo "✅  Pushed to $FOLDER/"
          fi
